# Local parity: npm run verify
# GitHub → Settings → Branches → require job "Install, typecheck, production build" on main.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-admin-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Install, typecheck, production build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.18.1'

      - name: Install dependencies (no lifecycle scripts)
        run: rm -rf node_modules && npm install --ignore-scripts --no-audit --no-fund

      - name: Typecheck
        run: npm run type-check

      - name: Production build
        run: npm run build
